<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linch Monte</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://i.ibb.co.com/7t2VfQmy/9b381ab8577f5d8b7187c8e3cf1cc37e.jpg') no-repeat center/cover;
  overflow: hidden;
  color: white;
}

/* затемнение */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* СТРАНИЦЫ */
.pages {
  display: flex;
  width: 400%;
  height: 100vh;
  transition: transform 0.5s ease;
  z-index: 2;
  position: relative;
}

.page {
  width: 100%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* ТЕКСТ */
h1 {
  font-size: 30px;
  margin: 0;
}

.sub {
  opacity: 0.7;
}

/* КНОПКИ */
.menu {
  position: fixed;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: space-around;
  z-index: 5;
}

.menu button {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px 15px;
  border-radius: 15px;
  color: white;
  font-size: 14px;
  transition: 0.3s;
}

.menu button:hover {
  background: rgba(0,150,255,0.4);
}

/* ДОЖДЬ */
.drop {
  position: fixed;
  top: -20px;
  width: 2px;
  height: 12px;
  background: rgba(255,255,255,0.4);
  animation: fall linear infinite;
  z-index: 1;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}

/* ПОТЁКИ */
.stream {
  position: fixed;
  top: -50px;
  width: 3px;
  height: 70px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  animation: streamFall linear infinite;
  z-index: 1;
}

@keyframes streamFall {
  to { transform: translateY(120vh); }
}

/* ПАР */
.smoke {
  position: fixed;
  bottom: 0;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
  border-radius: 50%;
  animation: smokeUp linear infinite;
  z-index: 1;
}

@keyframes smokeUp {
  to {
    transform: translateY(-120vh) scale(1.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- СТРАНИЦЫ -->
<div class="pages" id="pages">

  <div class="page">
    <h1>Создатель</h1>
    <div class="sub">Linch_Monte</div>
  </div>

  <div class="page">
    <h1>Telegram</h1>
    <div class="sub">@your_username</div>
  </div>

  <div class="page">
    <h1>Скачать</h1>
    <div class="sub">Скоро...</div>
  </div>

  <div class="page">
    <h1>Работы</h1>
    <div class="sub">Скоро...</div>
  </div>

</div>

<!-- МЕНЮ -->
<div class="menu">
  <button onclick="go(0)">TG</button>
  <button onclick="go(1)">Помощь</button>
  <button onclick="go(2)">Скачать</button>
  <button onclick="go(3)">Работы</button>
</div>

<script>
let index = 0;
const pages = document.getElementById("pages");

/* кнопки */
function go(i){
  index = i;
  pages.style.transform = `translateX(-${i*100}%)`;
}

/* свайп */
let startX = 0;

document.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if(diff > 50 && index < 3) index++;
  if(diff < -50 && index > 0) index--;

  go(index);
});

/* ДОЖДЬ */
for(let i=0;i<120;i++){
  let d=document.createElement('div');
  d.className='drop';
  d.style.left=Math.random()*100+'%';
  d.style.animationDuration=(0.5+Math.random())+'s';
  document.body.appendChild(d);
}

/* ПОТЁКИ */
for(let i=0;i<10;i++){
  let s=document.createElement('div');
  s.className='stream';
  s.style.left=Math.random()*100+'%';
  s.style.animationDuration=(2+Math.random()*2)+'s';
  document.body.appendChild(s);
}

/* ПАР */
for(let i=0;i<20;i++){
  let sm=document.createElement('div');
  sm.className='smoke';
  sm.style.left=Math.random()*100+'%';
  sm.style.animationDuration=(4+Math.random()*4)+'s';
  document.body.appendChild(sm);
}
</script>

</body>
</html>
