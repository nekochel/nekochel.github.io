<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEKOCHEL PRO</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  overflow:hidden;
  color:white;
}

/* ФОН С ТЯН */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('YOUR_IMAGE_URL') center/cover no-repeat;
  z-index:-3;
}

/* ТЁМНЫЙ ОВЕРЛЕЙ */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-2;
}

/* СТЕКЛО */
.glass{
  position:fixed;
  width:100%;
  height:100%;
  backdrop-filter: blur(10px);
  z-index:-1;
}

/* ДОЖДЬ (КАПЛИ) */
.rain{
  position:fixed;
  width:100%;
  height:100%;
  overflow:hidden;
}

.drop{
  position:absolute;
  width:2px;
  height:20px;
  background:rgba(255,255,255,0.3);
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
  }
}

/* ПАР */
.steam{
  position:fixed;
  bottom:0;
  width:100%;
  height:200px;
  pointer-events:none;
}

.smoke{
  position:absolute;
  bottom:0;
  width:100px;
  height:100px;
  background:radial-gradient(circle, rgba(255,255,255,0.2), transparent);
  animation:steam 6s infinite;
}

@keyframes steam{
  0%{transform:translateY(0) scale(1); opacity:0.5;}
  100%{transform:translateY(-200px) scale(2); opacity:0;}
}

/* КОНТЕНТ */
.container{
  position:relative;
  z-index:10;
  padding:20px;
  text-align:center;
}

h1{
  margin-top:30px;
  font-size:32px;
  color:#00f0ff;
  text-shadow:0 0 20px #00f0ff;
}

.card{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  box-shadow:0 0 20px rgba(0,255,255,0.2);
}

.btn{
  display:block;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:linear-gradient(45deg,#00f0ff,#0066ff);
  color:white;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="glass"></div>

<!-- ДОЖДЬ -->
<div class="rain" id="rain"></div>

<!-- ПАР -->
<div class="steam" id="steam"></div>

<div class="container">
  <h1>NEKOCHEL PRO</h1>

  <div class="card">
    <div>🔥 Лучший дизайн</div>
    <a href="#" class="btn">Открыть</a>
  </div>
</div>

<script>
/* ДОЖДЬ */
for(let i=0;i<120;i++){
  let drop=document.createElement('div');
  drop.className='drop';
  drop.style.left=Math.random()*100+'%';
  drop.style.animationDuration=(0.5+Math.random())+'s';
  document.getElementById('rain').appendChild(drop);
}

/* ПАР */
for(let i=0;i<10;i++){
  let smoke=document.createElement('div');
  smoke.className='smoke';
  smoke.style.left=Math.random()*100+'%';
  smoke.style.animationDelay=(Math.random()*5)+'s';
  document.getElementById('steam').appendChild(smoke);
}
</script>

</body>
</html>
