<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linch_Monte Market</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

.screen { display: none; padding: 20px; }
.active { display: block; }

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #00bfff;
  color: #fff;
}

.card {
  background: #111;
  padding: 12px;
  border-radius: 12px;
  margin: 10px 0;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #111;
}

.bottom button {
  flex: 1;
  background: none;
}
</style>
</head>

<body>

<!-- Вход -->
<div id="home" class="screen active">
  <h2>Добро пожаловать</h2>

  <select id="server">
    <option>Phoenix</option>
    <option>Tucson</option>
    <option>Scottdale</option>
    <option>Chandler</option>
  </select>

  <input id="nick" placeholder="Ваш ник">
  <button onclick="enter()">Войти</button>
</div>

<!-- Объявления -->
<div id="ads" class="screen">
  <h2>Объявления</h2>
  <div id="list"></div>
</div>

<!-- Добавить -->
<div id="add" class="screen">
  <h2>Продать</h2>

  <select id="type">
    <option>Машина</option>
    <option>Бизнес</option>
    <option>Скин</option>
  </select>

  <input id="title" placeholder="Название">
  <input id="price" placeholder="Цена">
  <input id="description" placeholder="Описание">
  <input type="file" id="image">

  <button onclick="addAd()">Опубликовать</button>
</div>

<!-- Профиль -->
<div id="profile" class="screen">
  <h2>Профиль</h2>
  <p id="info"></p>
</div>

<!-- Навигация -->
<div class="bottom">
  <button onclick="nav('ads')">Объявления</button>
  <button onclick="nav('add')">Продать</button>
  <button onclick="nav('profile')">Профиль</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCESik4SPSv6dXIxx8jDfMshHFR98wIECk",
  authDomain: "linchmonte.firebaseapp.com",
  projectId: "linchmonte",
  storageBucket: "linchmonte.firebasestorage.app",
  messagingSenderId: "818415056441",
  appId: "1:818415056441:web:8e37a6dd1646368d23bfe8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let user = {};

// вход
window.enter = function() {
  const nick = document.getElementById("nick").value;
  const server = document.getElementById("server").value;

  if(!nick) return alert("Введи ник");

  user = { nick, server };

  document.getElementById("info").innerText = nick + " | " + server;

  nav("ads");
  loadAds();
}

// навигация
window.nav = function(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id === "ads") loadAds();
}

// загрузка объявлений
async function loadAds() {
  const q = query(collection(db, "ads"));
  const snapshot = await getDocs(q);

  let html = "";

  snapshot.forEach(doc => {
    const ad = doc.data();

    html += `
      <div class="card">
        <img src="${ad.image || ''}">
        <h3>${ad.title}</h3>
        <p>💰 ${ad.price}</p>
        <p>${ad.description || ''}</p>
        <p>👤 ${ad.nick} (${ad.server})</p>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// добавление объявления
window.addAd = async function() {
  const file = document.getElementById("image").files[0];

  let imageUrl = "";

  if(file){
    const storageRef = ref(storage, "images/" + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db, "ads"), {
    title: document.getElementById("title").value,
    price: document.getElementById("price").value,
    description: document.getElementById("description").value,
    category: document.getElementById("type").value,
    image: imageUrl,
    nick: user.nick,
    server: user.server,
    createdAt: new Date()
  });

  alert("Объявление добавлено");

  nav("ads");
}

</script>

</body>
</html>
