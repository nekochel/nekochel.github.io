<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linch Monte</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://i.ibb.co.com/7t2VfQmy/9b381ab8577f5d8b7187c8e3cf1cc37e.jpg') no-repeat center center/cover;
  overflow: hidden;
  color: white;
}

/* затемнение */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

/* центр */
.center {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  z-index: 2;
}

h1 {
  font-size: 28px;
}

.sub {
  opacity: 0.7;
}

/* КАПЛИ */
.drop {
  position: fixed;
  top: -20px;
  width: 2px;
  height: 15px;
  background: rgba(255,255,255,0.5);
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

/* СТЕКАЮЩИЕ КАПЛИ */
.stream {
  position: fixed;
  top: -50px;
  width: 3px;
  height: 80px;
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
  animation: streamFall linear infinite;
}

@keyframes streamFall {
  to {
    transform: translateY(120vh);
  }
}

/* ПАР */
.smoke {
  position: fixed;
  bottom: 0;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
  border-radius: 50%;
  animation: smokeUp linear infinite;
}

@keyframes smokeUp {
  to {
    transform: translateY(-120vh) scale(1.5);
    opacity: 0;
  }
}

/* МЕНЮ */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.6);
  padding: 10px 0;
  z-index: 2;
}

.menu a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="center">
  <h1>Создатель</h1>
  <div class="sub">Linch_Monte</div>
</div>

<!-- МЕНЮ -->
<div class="menu">
  <a href="#">TG</a>
  <a href="#">Помощь</a>
  <a href="#">Скачать</a>
  <a href="#">Работы</a>
</div>

<script>
// мелкий дождь
for(let i=0;i<120;i++){
  let d=document.createElement('div');
  d.className='drop';
  d.style.left=Math.random()*100+'%';
  d.style.animationDuration=(0.5+Math.random())+'s';
  document.body.appendChild(d);
}

// редкие большие потёки
for(let i=0;i<10;i++){
  let s=document.createElement('div');
  s.className='stream';
  s.style.left=Math.random()*100+'%';
  s.style.animationDuration=(2+Math.random()*2)+'s';
  document.body.appendChild(s);
}

// пар
for(let i=0;i<20;i++){
  let sm=document.createElement('div');
  sm.className='smoke';
  sm.style.left=Math.random()*100+'%';
  sm.style.animationDuration=(4+Math.random()*4)+'s';
  document.body.appendChild(sm);
}
</script>

</body>
</html>
