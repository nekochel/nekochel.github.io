<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Marketplace</title>
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial;
    }

    header {
      padding: 15px;
      background: black;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 10px;
    }

    .form {
      background: #111;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: orange;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .ads {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .card {
      background: #111;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .price {
      color: orange;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>🔥 Marketplace</header>

<div class="container">

  <!-- ФОРМА -->
  <div class="form">
    <input id="title" placeholder="Название">
    <input id="price" placeholder="Цена">
    <input id="image" placeholder="Ссылка на картинку">
    <input id="server" placeholder="Сервер">
    <input id="nick" placeholder="Ник">
    <input id="description" placeholder="Описание">

    <select id="category">
      <option>Машина</option>
      <option>Бизнес</option>
      <option>Скин</option>
      <option>Аксессуар</option>
    </select>

    <button onclick="addAd()">Добавить объявление</button>
  </div>

  <!-- ОБЪЯВЛЕНИЯ -->
  <div class="ads" id="ads"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "linchmonte.firebaseapp.com",
  projectId: "linchmonte",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const adsContainer = document.getElementById("ads");

// 📥 Загрузка объявлений
async function loadAds() {
  adsContainer.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "ads"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    adsContainer.innerHTML += `
      <div class="card">
        <img src="${data.image}">
        <h3>${data.title}</h3>
        <p>${data.description}</p>
        <p class="price">💰 ${data.price}</p>
        <p>🌍 ${data.server}</p>
        <p>👤 ${data.nick}</p>
      </div>
    `;
  });
}

// ➕ Добавление объявления
window.addAd = async function () {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const image = document.getElementById("image").value;
  const server = document.getElementById("server").value;
  const nick = document.getElementById("nick").value;
  const description = document.getElementById("description").value;
  const category = document.getElementById("category").value;

  if (!title || !price) {
    alert("Заполни поля!");
    return;
  }

  await addDoc(collection(db, "ads"), {
    title,
    price,
    image,
    server,
    nick,
    description,
    category
  });

  alert("Объявление добавлено!");

  loadAds();
};

// 🚀 запуск
loadAds();

</script>

</body>
</html>
