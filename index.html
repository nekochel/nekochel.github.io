<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEKOCHEL PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow: hidden;

    /* ВОТ СЮДА ВСТАВЛЕНА КАРТИНКА */
    background: url("https://i.ibb.co/4pJvW9s/anime.jpg") no-repeat center center/cover;
}

/* затемнение */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

/* контент */
.container {
    position: relative;
    z-index: 10;
    text-align: center;
    margin-top: 120px;
}

h1 {
    font-size: 40px;
    color: #00eaff;
    text-shadow: 0 0 20px #00eaff;
}

.card {
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.btn {
    display: inline-block;
    padding: 15px 40px;
    border-radius: 30px;
    background: linear-gradient(45deg,#00eaff,#0077ff);
    color: white;
    text-decoration: none;
    font-size: 18px;
    z-index: 20;
}

/* эффекты */
#effects {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* капли */
.drop {
    position: absolute;
    width: 2px;
    height: 60px;
    background: rgba(255,255,255,0.4);
    animation: drip linear infinite;
}

.big-drop {
    width: 4px;
    height: 120px;
}

@keyframes drip {
    0% { transform: translateY(-100px); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}

/* пар */
.smoke {
    position: absolute;
    bottom: -100px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
    animation: smokeUp 6s linear infinite;
    filter: blur(20px);
}

@keyframes smokeUp {
    0% { transform: translateY(0); opacity: 0.3; }
    100% { transform: translateY(-600px); opacity: 0; }
}
</style>
</head>

<body>

<div id="effects"></div>

<div class="container">
    <h1>NEKOCHEL PRO</h1>

    <div class="card">
        🔥 Лучший дизайн
        <br><br>
        <a href="#" class="btn">Открыть</a>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

/* капли */
for(let i=0;i<80;i++){
    let drop=document.createElement('div');
    drop.className='drop';

    if(Math.random()>0.7){
        drop.classList.add('big-drop');
    }

    drop.style.left=Math.random()*100+'%';
    drop.style.animationDuration=(1+Math.random()*2)+'s';

    document.getElementById('effects').appendChild(drop);
}

/* пар */
for(let i=0;i<8;i++){
    let smoke=document.createElement('div');
    smoke.className='smoke';
    smoke.style.left=Math.random()*100+'%';
    smoke.style.animationDuration=(4+Math.random()*4)+'s';

    document.getElementById('effects').appendChild(smoke);
}
</script>

</body>
</html>
